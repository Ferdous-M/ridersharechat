<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RideShare 1-to-1 Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>1-to-1 Chat</h2>

<label>Sender ID: <input id="senderId" value="1"></label><br>
<label>Receiver ID: <input id="receiverId" value="2"></label><br>
<label>Message: <input id="message" value="Hello"></label><br>
<button onclick="sendMessage()">Send</button>
<button onclick="loadHistory()">Load History</button>

<ul id="chat"></ul>

<script>
    let stompClient = null;

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function(frame) {
            console.log('Connected: ' + frame);
            const receiverId = document.getElementById('receiverId').value;
            stompClient.subscribe('/queue/messages/' + receiverId, function(msg) {
                const message = JSON.parse(msg.body);
                const li = document.createElement('li');
                li.innerText = `From ${message.senderId}: ${message.message}`;
                document.getElementById('chat').appendChild(li);
            });
        });
    }

    function sendMessage() {
        const message = {
            senderId: parseInt(document.getElementById('senderId').value),
            receiverId: parseInt(document.getElementById('receiverId').value),
            message: document.getElementById('message').value
        };
        stompClient.send("/app/send", {}, JSON.stringify(message));
    }

    function loadHistory() {
        const user1 = document.getElementById('senderId').value;
        const user2 = document.getElementById('receiverId').value;
        fetch(`/api/chat/history?user1=${user1}&user2=${user2}`)
            .then(res => res.json())
            .then(messages => {
                const ul = document.getElementById('chat');
                ul.innerHTML = '';
                messages.forEach(msg => {
                    const li = document.createElement('li');
                    li.innerText = `From ${msg.senderId}: ${msg.message}`;
                    ul.appendChild(li);
                });
            });
    }

    // Connect on page load
    connect();
</script>
</body>
</html>
